<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#F7F4EE" />
    <link rel="icon" href="data:," />
    <title>Planning-AVD</title>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Orbitron:wght@600;800&family=Space+Grotesk:wght@400;600;700&display=swap");
      html,body{min-height:100%;margin:0;background:radial-gradient(circle at 14% 10%,rgba(191,244,223,.7),transparent 28%),radial-gradient(circle at 86% 12%,rgba(221,214,255,.68),transparent 28%),radial-gradient(circle at 28% 88%,rgba(255,210,234,.62),transparent 30%),linear-gradient(135deg,#fffefa,#f6fbff 48%,#fff8fd)!important}
      body{font-family:"Space Grotesk",system-ui,sans-serif;color:#25302c}
      #root *{letter-spacing:0!important}
      #root h1,#root h2,#root h3,#root b{font-family:"Orbitron","Space Grotesk",system-ui,sans-serif!important}
      #root>div{background:transparent!important;max-width:1180px!important}
      #root div[style*="border-radius"],#root div[style*="box-shadow"],#root div[style*="background:#FFF"],#root div[style*="background: #FFF"],#root div[style*="background:rgba"],#root div[style*="background: rgba"]{background:linear-gradient(145deg,rgba(255,255,255,.76),rgba(255,255,255,.42))!important;border:1px solid rgba(255,255,255,.92)!important;box-shadow:inset 0 1px 0 rgba(255,255,255,.96),inset 0 -1px 0 rgba(120,140,160,.10),0 14px 34px rgba(90,110,130,.16),0 3px 0 rgba(255,255,255,.55)!important;backdrop-filter:blur(18px) saturate(1.18)}
      #root button,#root a[href^="mailto:"],#root input,#root select,#root textarea{font-family:"Space Grotesk",system-ui,sans-serif!important;border:1px solid rgba(255,255,255,.95)!important;background:linear-gradient(145deg,rgba(255,255,255,.86),rgba(255,255,255,.50))!important;color:#29352f!important;box-shadow:inset 0 1px 0 rgba(255,255,255,.95),0 9px 22px rgba(102,122,142,.15),0 2px 0 rgba(255,255,255,.72)!important;backdrop-filter:blur(14px) saturate(1.2)}
      #root button{font-weight:800!important;text-shadow:0 1px 0 rgba(255,255,255,.55)}
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script src="https://cdn.jsdelivr.net/npm/react@18/umd/react.production.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@babel/standalone/babel.min.js"></script>
    <script src="./auth-config.js"></script>
    <script>
      (async () => {
        const root = document.getElementById("root");
        const fail = error => {
          console.error(error);
          if (root) root.innerHTML = '<div style="font:16px system-ui;padding:24px;color:#7a1d1d">Impossible de charger Planning-AVD. Rechargez la page dans un instant.</div>';
        };
        const loadText = url => new Promise((resolve, reject) => {
          if (window.fetch) {
            fetch(url, { cache: "no-cache" })
              .then(response => response.ok ? response.text() : Promise.reject(new Error(`${url} introuvable (${response.status})`)))
              .then(resolve, reject);
            return;
          }
          const xhr = new XMLHttpRequest();
          xhr.open("GET", url, true);
          xhr.onload = () => (xhr.status >= 200 && xhr.status < 300) ? resolve(xhr.responseText) : reject(new Error(`${url} introuvable (${xhr.status})`));
          xhr.onerror = () => reject(new Error(`${url} inaccessible`));
          xhr.send();
        });
        window.__planningLoadText = loadText;
        try {
          let source = await loadText("https://raw.githubusercontent.com/unispourlapaix/Planning-AVD/main/patch-loader.js?v=20260525-chef-fair");
          source = source
            .replace(
              'fetch("./browser-loader.js", { cache: "no-cache" })',
              'fetch("https://raw.githubusercontent.com/unispourlapaix/Planning-AVD/main/browser-loader.js?v=20260525-chef-fair", { cache: "no-cache" })'
            )
            .replace(
              'const response = await fetch("https://raw.githubusercontent.com/unispourlapaix/Planning-AVD/main/browser-loader.js?v=20260525-chef-fair", { cache: "no-cache" });\n    if (!response.ok) throw new Error(`browser-loader.js introuvable (${response.status})`);\n    let code = await response.text();',
              `let code = await window.__planningLoadText("https://raw.githubusercontent.com/unispourlapaix/Planning-AVD/main/browser-loader.js?v=20260525-chef-fair");
    code = code
      .replace('const response = await fetch("./planning-avd.jsx", { cache: "no-cache" });', 'const response = { ok: true, text: () => window.__planningLoadText("https://raw.githubusercontent.com/unispourlapaix/Planning-AVD/main/planning-avd.jsx?v=20260525-chef-fair") };')
      .replace('const s = d && sched[d], sm=s?.morning, se=s?.evening, pm=sm&&PAL[pidIx(sm.worker)], pe=se&&PAL[pidIx(se.worker)], a = d && acts[d];', 'const s = d && sched[d], sm=s?.morning, se=s?.evening, sn=s?.night, am=sm?.worker, ev=se?.worker, rawN=sn?.worker, nt=allowedShift(rawN,"night",auxRules)?rawN:(allowedShift(ev,"night",auxRules)?ev:null), pm=am&&PAL[pidIx(am)], pe=ev&&PAL[pidIx(ev)], pn=nt&&PAL[pidIx(nt)], a = d && acts[d];')
      .replace('height:62,borderRadius:12', 'height:118,borderRadius:12')
      .replace('[[\\"M\\",sm,pm],[\\"S\\",se,pe]]', '[[\\"Matin\\",am,pm],[\\"Après-midi\\",ev,pe],[\\"Nuit\\",nt,pn]]')
      .replace('height:14,borderRadius:8', 'minHeight:24,borderRadius:8')
      .replace('{x[1]?initial(names,x[1].worker,priv):\\"-\\"}', '{x[1]?pName(names,x[1],priv):\\"A definir\\"}');`
            )
            .replace(
              'const allowedShift = (p,shift,auxRules={}) => shift === "night" ? !!auxRules[p]?.night || auxRules[p]?.shift === "night" : (!auxRules[p]?.shift || auxRules[p].shift === "all" || auxRules[p].shift === shift);',
              'const allowedShift = (p,shift,auxRules={}) => { const r=auxRules[p]||{}, s=r.shift||"all"; if (shift==="night") return !!r.night || s==="night"; if (s==="night") return false; if (s==="morning") return shift==="morning"; if (s==="evening") return shift==="evening"; return s==="all" || s===shift; };'
            )
            .replace(
              'const shiftPayHours = s => s === "night" ? 12 : 5.75;',
              'const shiftPayHours = s => s === "night" ? 12 : 6;'
            )
            .replace(
              'const fairPick = (team,load,auxRules,ok,prev=null) => { const arr = team.filter(p => p && p !== prev && ok(p)); if (!arr.length) return null; return arr.sort((a,b)=>loadScore(a,load,auxRules)-loadScore(b,load,auxRules))[0]; };',
              'const fairPick = (team,load,auxRules,ok,prev=null) => { const pool = team.filter(p => p && ok(p)); const src = pool.filter(p => p !== prev); const list = src.length ? src : pool; return list.sort((a,b)=>loadScore(a,load,auxRules)-loadScore(b,load,auxRules) || team.indexOf(a)-team.indexOf(b))[0] || null; };'
            )
            .replace(
              'const rotationTeam = (ids=[],auxRules={}) => { const base = ids.filter(p => TIDS.includes(p)); const lead = base.find(p => auxRules[p]?.lead); if (!lead) return base; const others = base.filter(p => p !== lead); return others.length ? others.flatMap(p => [lead,p]) : [lead]; };',
              'const rotationTeam = (ids=[],auxRules={},weekend=false) => { const base = ids.filter(p => TIDS.includes(p)); if (weekend) return base; const lead = base.find(p => auxRules[p]?.lead); if (!lead) return base; const others = base.filter(p => p !== lead); return [lead,...others]; };'
            )
            .replace(
              'const weTeam = rotationTeam(baseTeam,auxRules);\n  const wdTeam = weTeam;',
              'const weTeam = rotationTeam(baseTeam,auxRules,true);\n  const wdTeam = rotationTeam(baseTeam,auxRules,false);'
            );
          (0, eval)(source + "\n//# sourceURL=planning-avd-inline-loader.js");
        } catch (error) {
          fail(error);
        }
      })();
    </script>
  </body>
</html>
