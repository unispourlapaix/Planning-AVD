<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#F7F4EE" />
    <link rel="icon" href="data:," />
    <title>Planning-AVD</title>
    <style>
      #root button span b {
        color: #746D61 !important;
        background: #FFFFFF !important;
        border: 1px solid #E5DED2 !important;
        border-radius: 6px !important;
        min-width: 12px !important;
        text-align: center !important;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script src="https://cdn.jsdelivr.net/npm/react@18/umd/react.production.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@babel/standalone/babel.min.js"></script>
    <script src="./auth-config.js"></script>
    <script>
(async () => {
  const root = document.getElementById("root");
  const fail = error => {
    console.error(error);
    if (root) root.innerHTML = '<div style="font:16px system-ui;padding:24px;color:#7a1d1d">Impossible de charger Planning-AVD. Rechargez la page dans un instant.</div>';
  };

  const replaceOnce = (code, before, after) => {
    if (!code.includes(before)) return code;
    return code.replace(before, after);
  };

  try {
    const neutralShiftStyle = document.createElement("style");
    neutralShiftStyle.textContent = '#root button span b{color:#746D61!important;background:#FFFFFF!important;border:1px solid #E5DED2!important;border-radius:6px!important;min-width:12px!important;text-align:center!important}';
    document.head.appendChild(neutralShiftStyle);

    const response = await fetch("./browser-loader.js", { cache: "no-cache" });
    if (!response.ok) throw new Error(`browser-loader.js introuvable (${response.status})`);
    let code = await response.text();
    const weekViewSource = String.raw`function WeekView() {
    const today = new Date();
    const first = Math.max(1, Math.min(dim(y,m), today.getFullYear()===y && today.getMonth()===m ? today.getDate() : 1));
    const [ws,setWs] = useState(Math.max(1, first - dowD(y,m,first)));
    const days = Array.from({length:7},(_,i)=>ws+i);
    const moveWeek = n => setWs(v => Math.max(1, Math.min(Math.max(1, dim(y,m)-6), v + n*7)));
    const rangeEnd = Math.min(dim(y,m),ws+6);
    const dayBox = d => {
      if (d < 1 || d > dim(y,m)) return <div key={d} style={{minHeight:236,borderRadius:14,background:"rgba(255,255,255,.35)",border:"1px dashed #E5DED2"}} />;
      const sm=sched[d]?.morning, se=sched[d]?.evening, sn=sched[d]?.night, am=sm?.worker, pmw=se?.worker, nw=sn?.worker, a=acts[d]||{}, isToday=today.getFullYear()===y&&today.getMonth()===m&&today.getDate()===d;
      const shiftRow = (label,pid,color) => <div key={label} style={{display:"grid",gap:4,padding:"8px 9px",border:"1px solid #E7DFD2",borderLeft:"4px solid "+color,borderRadius:10,background:"#FFFFFF"}}>
        <b style={{color:"#746D61",fontSize:11,letterSpacing:0,fontWeight:900,lineHeight:1}}>{label}</b>
        <span style={{minWidth:0,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",fontSize:13,fontWeight:900,color:PAL[pidIx(pid)]?.text||"#4F5D4A"}}>{pid?pName(names,pid,priv):"A definir"}</span>
      </div>;
      return <div key={d} style={{...card,minHeight:236,padding:10,display:"grid",gridTemplateRows:"auto 1fr auto",gap:8,background:isToday?"#FFF9EA":"#FFFDF8",borderColor:isToday?"#E8C878":"#E5DED2"}}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",gap:8}}>
          <div style={{minWidth:0}}><div style={{fontSize:11,fontWeight:900,color:"#746D61"}}>{DS[dowD(y,m,d)]}</div><b style={{fontSize:19,color:"#3F4A3A"}}>{d}</b></div>
          <button title="Detail du jour" onClick={()=>setDayMod(d)} style={{...btn(false),minWidth:68,height:32,padding:"0 9px",borderRadius:10,fontSize:12,lineHeight:1}}>+ Detail</button>
        </div>
        <div style={{display:"grid",gap:6,alignContent:"start"}}>
          {[["Matin",am,"#C99A52"],["Soir",pmw,"#6F7FA8"],["Nuit",nw,"#44506F"]].map(x=>shiftRow(x[0],x[1],x[2]))}
        </div>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",gap:6,minHeight:20,borderTop:"1px solid #EEE7DC",paddingTop:6}}>
          <span style={{fontSize:11,color:"#746D61",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{lieux[d]||"Lieu a preciser"}</span>
          {a?.types?.length>0&&<span style={{fontSize:12}}>{a.types.map(t=>ACTS.find(x=>x[0]===t)?.[2]).join("")}</span>}
        </div>
      </div>;
    };
    return <div className="su" style={{display:"grid",gap:12}}>
      <div style={{...card,padding:12,display:"grid",gridTemplateColumns:"auto 1fr auto",gap:10,alignItems:"center",background:"#FFFDF8"}}>
        <button onClick={()=>moveWeek(-1)} style={btn(false)}>‹ Semaine</button>
        <div style={{textAlign:"center",minWidth:0}}><b style={{display:"block",color:"#3F4A3A",fontSize:18}}>Semaine du {ws} au {rangeEnd} {MFR[m]}</b><span style={{fontSize:12,color:"#746D61"}}>{MFR[m]} {y}</span></div>
        <button onClick={()=>moveWeek(1)} style={btn(false)}>Semaine ›</button>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(7,minmax(0,1fr))",gap:8}}>{days.map(dayBox)}</div>
      <div style={{display:"flex",justifyContent:"flex-end"}}><button onClick={()=>setEmailMod(true)} style={btn(true,"#8B9A7A")}>Envoyer cette semaine</button></div>
    </div>;
  }

  function HoursView`;
    const hoursViewSource = String.raw`function HoursView() {
    const calc = activeIds.reduce((a,p)=>(a[p]={real:0,pay:0,nights:0,days:0},a),{});
    blks.forEach(b => {
      if (!calc[b.workerId]) return;
      const n = Math.max(1,b.end-b.start+1);
      calc[b.workerId].real += n * shiftRealHours(b.shift);
      calc[b.workerId].pay += n * shiftPayHours(b.shift);
      if (b.shift === "night") calc[b.workerId].nights += n;
      else calc[b.workerId].days += n * .5;
    });
    return <div className="su" style={{display:"grid",gap:10}}>
      <div style={{...card,padding:12,background:"#FFFDF8"}}><b style={{color:"#3F4A3A"}}>Heures reelles MDPH / paye</b><p style={{fontSize:12,color:"#746D61",margin:"6px 0 0"}}>Le quota vient de la fiche auxiliaire (ex: 151h, 72h). Les depassements sont des ecarts a valider, pas des heures sup automatiques. Jour complet: 12h reelles, 11h30 paye apres pause. Nuit: 12h.</p></div>
      {activeIds.map(p => {
        const r = calc[p] || {real:0,pay:0,nights:0,days:0}, rule=auxRules[p]||{}, quota=+rule.quota||MAX_H, add=+ah[p]||0, special=+rule.special||0, pay=r.pay+add, gap=Math.round((pay-quota)*100)/100, c=gap>0?"#D94C4C":pay>quota*.85?"#E6A23C":PAL[pidIx(p)].solid;
        return <div key={p} style={{...card,padding:12,display:"grid",gap:9,background:"#FFFDF8"}}>
          <div style={{display:"flex",alignItems:"center",gap:10}}><Av t={p} st={stat[p]} names={names} priv={priv}/><b style={{flex:1,color:PAL[pidIx(p)].text}}>{pName(names,p,priv)}</b><input type="number" value={ah[p]||""} onChange={e=>setAh(x=>({...x,[p]:e.target.value}))} placeholder="+/- h" title="Correction ponctuelle" style={{width:78,padding:8,borderRadius:12,border:"1px solid #E5DED2",fontFamily:"DM Mono",fontWeight:900}} /></div>
          <HBar v={pay} c={c}/>
          <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:7,fontSize:12,color:"#4F5D4A"}}>
            <span><b>{Math.round(r.real*100)/100}h</b><br/>Reelles</span>
            <span><b>{Math.round(pay*100)/100}h</b><br/>Paye</span>
            <span><b>{quota}h</b><br/>Quota</span>
            <span><b>{Math.round((quota-pay)*100)/100}h</b><br/>Reste</span>
          </div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:7,fontSize:12,color:"#746D61"}}>
            <span><b>{r.nights}</b><br/>Nuits</span>
            <span><b>{r.days}</b><br/>Jours</span>
            <span><b>{special}h</b><br/>Cas special</span>
          </div>
          {gap>0 && <div style={{color:"#B83232",fontWeight:900,fontSize:12}}>+{gap}h au-dessus du quota, a valider sans majoration automatique</div>}
        </div>;
      })}
    </div>;
  }

  function ConfigView`;
    const teamMiniSource = String.raw`function TeamMini() {
    return null;
  }

  function MonthView`;
    const weekViewPatch = 'const googleWeekView = `' + weekViewSource + '`;\n  const googleHoursView = `' + hoursViewSource + '`;\n  const googleTeamMini = `' + teamMiniSource + '`;';

    code = replaceOnce(
      code,
      '  function DayModal`;\n\n  try {',
      '  function DayModal`;\n\n  ' + weekViewPatch + '\n\n  try {'
    );

    code = replaceOnce(
      code,
      '.replace(/function ConfigView\\(\\) \\{[\\s\\S]*?\\n  function DayModal/, googleConfigView);',
      '.replace(/function TeamMini\\(\\) \\{[\\s\\S]*?\\n  function MonthView/, googleTeamMini)\n      .replace(/function WeekView\\(\\) \\{[\\s\\S]*?\\n  function HoursView/, googleWeekView)\n      .replace(/function HoursView\\(\\) \\{[\\s\\S]*?\\n  function ConfigView/, googleHoursView)\n      .replace(/function ConfigView\\(\\) \\{[\\s\\S]*?\\n  function DayModal/, googleConfigView);'
    );

    code = replaceOnce(
      code,
      'const ruleDays = r => r?.days === "weekend" ? [4,5,6] : r?.days === "weekdays" ? [0,1,2,3] : r?.days === "custom" ? (r.custom||[]) : [0,1,2,3,4,5,6];',
      'const ruleDays = r => r?.days === "weekend" ? [5,6] : r?.days === "weekdays" ? [0,1,2,3,4] : r?.days === "custom" ? (r.custom||[]) : [0,1,2,3,4,5,6];'
    );

    code = replaceOnce(
      code,
      'const SHIFTS = [{id:"morning",label:"Matin"},{id:"evening",label:"Soir"}];',
      'const SHIFTS = [{id:"morning",label:"Matin",real:6,pay:5.75},{id:"evening",label:"Soir",real:6,pay:5.75},{id:"night",label:"Nuit",real:12,pay:12}];'
    );

    code = replaceOnce(
      code,
      'const shiftLabel = s => s === "morning" ? "Matin" : s === "evening" ? "Soir" : "";',
      'const shiftLabel = s => s === "morning" ? "Matin" : s === "evening" ? "Soir" : s === "night" ? "Nuit" : "";'
    );

    code = replaceOnce(
      code,
      'const allowedShift = (p,shift,auxRules={}) => !auxRules[p]?.shift || auxRules[p].shift === "all" || auxRules[p].shift === shift;',
      'const allowedShift = (p,shift,auxRules={}) => shift === "night" ? !!auxRules[p]?.night || auxRules[p]?.shift === "night" : (!auxRules[p]?.shift || auxRules[p].shift === "all" || auxRules[p].shift === shift);'
    );

    code = replaceOnce(
      code,
      'const fillSched = blks => {',
      'const shiftRealHours = s => s === "night" ? 12 : 6;\nconst shiftPayHours = s => s === "night" ? 12 : 5.75;\nconst quotaHours = (p,auxRules={}) => Math.max(1,+auxRules[p]?.quota||MAX_H);\nconst blockHours = b => Math.max(1,b.end-b.start+1)*shiftPayHours(b.shift);\nconst loadScore = (p,load={},auxRules={}) => ((load[p]||0)/quotaHours(p,auxRules));\nconst addLoad = (load,p,b) => { if (p) load[p] = (load[p]||0) + blockHours(b); return p; };\nconst fairPick = (team,load,auxRules,ok,prev=null) => { const arr = team.filter(p => p && p !== prev && ok(p)); if (!arr.length) return null; return arr.sort((a,b)=>loadScore(a,load,auxRules)-loadScore(b,load,auxRules))[0]; };\nconst fillSched = blks => {'
    );

    code = replaceOnce(
      code,
      'source = source\n      .replace(/^import[^\\n]*(?:\\r?\\n|$)/gm, "")',
      'source = source\n      .replace("const [y,setY] = useState(now.getFullYear()), [m,setM] = useState(now.getMonth()), [view,setView] = useState(\\"month\\");", "const [y,setY] = useState(now.getFullYear()), [m,setM] = useState(now.getMonth()), [view,setView] = useState(\\"week\\");")\n      .replace("return <div style={{minHeight:\\"100vh\\",maxWidth:430,margin:\\"0 auto\\",background:\\"linear-gradient(155deg, #EBF5FF 0%, #FBFCFF 55%, #F0ECFF 100%)\\",fontFamily:\\"Nunito, system-ui, sans-serif\\",color:\\"#294C69\\"}}>", "return <div style={{minHeight:\\"100vh\\",maxWidth:1180,margin:\\"0 auto\\",background:\\"linear-gradient(155deg, #F7F4EE 0%, #FFFEFA 48%, #F1EDE4 100%)\\",fontFamily:\\"Nunito, system-ui, sans-serif\\",color:\\"#3F4A3A\\"}}>")\n      .replace("const wd = dowD(y,m,d), type = wd <= 3 ? \\"wd\\" : \\"we\\", endDow = type === \\"wd\\" ? 3 : 6;", "const wd = dowD(y,m,d), type = wd <= 4 ? \\"wd\\" : \\"we\\", endDow = type === \\"wd\\" ? 4 : 6;")\n      .replace(\'{we?"Ven→Dim":"Lun→Jeu"}\', \'{we?"Sam→Dim":"Lun→Ven"}\')\n      .replace(/^import[^\\n]*(?:\\r?\\n|$)/gm, "")'
    );

    code = replaceOnce(
      code,
      't === \\"wd\\" ? \\"Lun-Jeu\\" : \\"Ven-Dim\\"',
      't === \\"wd\\" ? \\"Lun-Ven\\" : \\"Sam-Dim\\"'
    );

    code = replaceOnce(
      code,
      'setAuxRules(x => ({...x, [next]: x[next] || {days:"all",shift:"all",custom:[0,1,2,3,4,5,6]}}));',
      'setAuxRules(x => ({...x, [next]: x[next] || {days:"all",shift:"all",custom:[0,1,2,3,4,5,6],lead:false,night:false}}));'
    );

    code = replaceOnce(
      code,
      'r=auxRules[p]||{days:"all",shift:"all",custom:[0,1,2,3,4,5,6]}; const updRule = patch => setAuxRules(x=>({...x,[p]:{...(x[p]||{days:"all",shift:"all",custom:[0,1,2,3,4,5,6]}),...patch}}));',
      'r=auxRules[p]||{days:"all",shift:"all",custom:[0,1,2,3,4,5,6],lead:false,night:false}; const updRule = patch => setAuxRules(x=>({...x,[p]:{...(x[p]||{days:"all",shift:"all",custom:[0,1,2,3,4,5,6],lead:false,night:false}),...patch}}));'
    );

    code = replaceOnce(
      code,
      '<textarea defaultValue={c.address||""} onBlur={e=>setAuxContacts(x=>({...x,[p]:{...(x[p]||{}),address:e.target.value}}))} placeholder="Adresse complete" style={{width:"100%",boxSizing:"border-box",minHeight:58,marginTop:7,padding:10,borderRadius:12,border:"1px solid #E5DED2"}} /><div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:7,marginTop:8}}><select',
      '<textarea defaultValue={c.address||""} onBlur={e=>setAuxContacts(x=>({...x,[p]:{...(x[p]||{}),address:e.target.value}}))} placeholder="Adresse complete" style={{width:"100%",boxSizing:"border-box",minHeight:58,marginTop:7,padding:10,borderRadius:12,border:"1px solid #E5DED2"}} /><label style={{display:"flex",gap:8,alignItems:"center",marginTop:8,padding:9,border:"1px solid #E5DED2",borderRadius:12,background:"#FFFFFF",fontSize:12,fontWeight:900,color:"#4F5D4A"}}><input type="checkbox" checked={!!r.lead} onChange={e=>updRule({lead:e.target.checked})}/> Chef d&apos;equipe prioritaire</label><div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:7,marginTop:8}}><select'
    );

    code = replaceOnce(
      code,
      '<option value="all">Matin + soir</option><option value="morning">Matin</option><option value="evening">Soir</option>',
      '<option value="all">Matin + soir</option><option value="morning">Matin</option><option value="evening">Soir</option><option value="night">Nuit seulement</option>'
    );

    code = replaceOnce(
      code,
      '<label style={{display:"flex",gap:8,alignItems:"center",marginTop:8,padding:9,border:"1px solid #E5DED2",borderRadius:12,background:"#FFFFFF",fontSize:12,fontWeight:900,color:"#4F5D4A"}}><input type="checkbox" checked={!!r.lead} onChange={e=>updRule({lead:e.target.checked})}/> Chef d&apos;equipe prioritaire</label>',
      '<label style={{display:"flex",gap:8,alignItems:"center",marginTop:8,padding:9,border:"1px solid #E5DED2",borderRadius:12,background:"#FFFFFF",fontSize:12,fontWeight:900,color:"#4F5D4A"}}><input type="checkbox" checked={!!r.lead} onChange={e=>updRule({lead:e.target.checked})}/> Chef d&apos;equipe prioritaire</label><label style={{display:"flex",gap:8,alignItems:"center",marginTop:8,padding:9,border:"1px solid #E5DED2",borderRadius:12,background:"#FFFFFF",fontSize:12,fontWeight:900,color:"#4F5D4A"}}><input type="checkbox" checked={!!r.night} onChange={e=>updRule({night:e.target.checked})}/> Surveillance de nuit 12h</label>'
    );

    code = replaceOnce(
      code,
      '<label style={{display:"flex",gap:8,alignItems:"center",marginTop:8,padding:9,border:"1px solid #E5DED2",borderRadius:12,background:"#FFFFFF",fontSize:12,fontWeight:900,color:"#4F5D4A"}}><input type="checkbox" checked={!!r.night} onChange={e=>updRule({night:e.target.checked})}/> Surveillance de nuit 12h</label>',
      '<label style={{display:"flex",gap:8,alignItems:"center",marginTop:8,padding:9,border:"1px solid #E5DED2",borderRadius:12,background:"#FFFFFF",fontSize:12,fontWeight:900,color:"#4F5D4A"}}><input type="checkbox" checked={!!r.night} onChange={e=>updRule({night:e.target.checked})}/> Surveillance de nuit 12h</label><div style={{display:"grid",gap:6,marginTop:8}}><b style={{fontSize:12,color:"#4F5D4A"}}>Heures de travail</b><div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:7}}><input type="number" value={r.quota||""} onChange={e=>updRule({quota:e.target.value})} placeholder="Quota mensuel ex 151" style={{minWidth:0,padding:10,borderRadius:12,border:"1px solid #E5DED2",fontFamily:"DM Mono",fontWeight:900}}/><input type="number" value={r.special||""} onChange={e=>updRule({special:e.target.value})} placeholder="Cas special h" style={{minWidth:0,padding:10,borderRadius:12,border:"1px solid #E5DED2",fontFamily:"DM Mono",fontWeight:900}}/></div></div>'
    );

    code = replaceOnce(
      code,
      'const allowedBlock = (p,b,y,m,auxRules={}) => allowedShift(p,b.shift,auxRules) && Array.from({length:b.end-b.start+1},(_,i)=>b.start+i).every(d=>allowedOn(p,y,m,d,auxRules));\nconst splitBlocks',
      'const allowedBlock = (p,b,y,m,auxRules={}) => allowedShift(p,b.shift,auxRules) && Array.from({length:b.end-b.start+1},(_,i)=>b.start+i).every(d=>allowedOn(p,y,m,d,auxRules));\nconst rotationTeam = (ids=[],auxRules={}) => { const base = ids.filter(p => TIDS.includes(p)); const lead = base.find(p => auxRules[p]?.lead); if (!lead) return base; const others = base.filter(p => p !== lead); return others.length ? others.flatMap(p => [lead,p]) : [lead]; };\nconst splitBlocks'
    );

    code = replaceOnce(
      code,
      'const weTeam = (activeIds && activeIds.length ? activeIds : TIDS.slice(0,4)).filter(p => TIDS.includes(p));\n  const wdTeam = weTeam;',
      'const baseTeam = (activeIds && activeIds.length ? activeIds : TIDS.slice(0,4)).filter(p => TIDS.includes(p));\n  const weTeam = rotationTeam(baseTeam,auxRules);\n  const wdTeam = weTeam;'
    );

    code = replaceOnce(
      code,
      'let weIdx = startWeIdx || 0, wdIdx = 0, prevWe = null, prevWd = null, dup = 0;',
      'let weIdx = startWeIdx || 0, wdIdx = 0, prevWe = null, prevWd = null, dup = 0;\n  const load = {};'
    );

    code = replaceOnce(
      code,
      'const n = dim(y,m), team = (activeIds && activeIds.length ? activeIds : TIDS.slice(0,4)).filter(p => TIDS.includes(p)), blks = [];',
      'const n = dim(y,m), baseTeam = (activeIds && activeIds.length ? activeIds : TIDS.slice(0,4)).filter(p => TIDS.includes(p)), team = rotationTeam(baseTeam,auxRules), blks = [];'
    );

    code = code
      .replaceAll('let idx = 0, rot = startIdx || 0, prev = null;', 'let idx = 0, rot = startIdx || 0, prev = null;\n  const load = {};')
      .replaceAll('let rot = startIdx || 0, prev = null;', 'let rot = startIdx || 0, prev = null;\n  const load = {};');

    code = replaceOnce(
      code,
      'const n = dim(y,m), team = (activeIds && activeIds.length ? activeIds : TIDS.slice(0,4)).filter(p => TIDS.includes(p)), blks = [];',
      'const n = dim(y,m), baseTeam = (activeIds && activeIds.length ? activeIds : TIDS.slice(0,4)).filter(p => TIDS.includes(p)), team = rotationTeam(baseTeam,auxRules), blks = [];'
    );

    code = replaceOnce(
      code,
      '{schedRule==="twoDayRest"&&<><p style={{fontSize:12,color:"#667F94",margin:"10px 0 6px"}}>Repos semaine 1</p><div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:7}}>{activeIds.map((p,i)=><button key={p} onClick={()=>setRestStart(i)} style={btn(restStart===i,PAL[pidIx(p)].solid)}>{pName(names,p,priv)}</button>)}</div></>}',
      ''
    );

    code = replaceOnce(code, '>2j + repos</button>', '>2 jours</button>');

    code = replaceOnce(
