<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#F7F4EE" />
    <link rel="icon" href="data:," />
    <title>Planning-AVD</title>
    <style>
      #root button span b {
        color: #746D61 !important;
        background: #FFFFFF !important;
        border: 1px solid #E5DED2 !important;
        border-radius: 6px !important;
        min-width: 12px !important;
        text-align: center !important;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script src="https://cdn.jsdelivr.net/npm/react@18/umd/react.production.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@babel/standalone/babel.min.js"></script>
    <script src="./auth-config.js"></script>
    <script>
(async () => {
  const root = document.getElementById("root");
  const fail = error => {
    console.error(error);
    if (root) root.innerHTML = '<div style="font:16px system-ui;padding:24px;color:#7a1d1d">Impossible de charger Planning-AVD. Rechargez la page dans un instant.</div>';
  };

  const replaceOnce = (code, before, after) => {
    if (!code.includes(before)) return code;
    return code.replace(before, after);
  };

  try {
    const neutralShiftStyle = document.createElement("style");
    neutralShiftStyle.textContent = '#root button span b{color:#746D61!important;background:#FFFFFF!important;border:1px solid #E5DED2!important;border-radius:6px!important;min-width:12px!important;text-align:center!important}';
    document.head.appendChild(neutralShiftStyle);

    const response = await fetch("./browser-loader.js", { cache: "no-cache" });
    if (!response.ok) throw new Error(`browser-loader.js introuvable (${response.status})`);
    let code = await response.text();
    const weekViewSource = String.raw`function WeekView() {
    const today = new Date();
    const first = Math.max(1, Math.min(dim(y,m), today.getFullYear()===y && today.getMonth()===m ? today.getDate() : 1));
    const [ws,setWs] = useState(Math.max(1, first - dowD(y,m,first)));
    const days = Array.from({length:7},(_,i)=>ws+i);
    const moveWeek = n => setWs(v => Math.max(1, Math.min(Math.max(1, dim(y,m)-6), v + n*7)));
    const rangeEnd = Math.min(dim(y,m),ws+6);
    const dayBox = d => {
      if (d < 1 || d > dim(y,m)) return <div key={d} style={{minHeight:196,borderRadius:14,background:"rgba(255,255,255,.35)",border:"1px dashed #E5DED2"}} />;
      const sm=sched[d]?.morning, se=sched[d]?.evening, am=sm?.worker, pmw=se?.worker, a=acts[d]||{}, isToday=today.getFullYear()===y&&today.getMonth()===m&&today.getDate()===d;
      const shiftRow = (label,pid,color) => <div key={label} style={{display:"grid",gap:4,padding:"8px 9px",border:"1px solid #E7DFD2",borderLeft:"4px solid "+color,borderRadius:10,background:"#FFFFFF"}}>
        <b style={{color:"#746D61",fontSize:11,letterSpacing:0,fontWeight:900,lineHeight:1}}>{label}</b>
        <span style={{minWidth:0,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",fontSize:13,fontWeight:900,color:PAL[pidIx(pid)]?.text||"#4F5D4A"}}>{pid?pName(names,pid,priv):"A definir"}</span>
      </div>;
      return <div key={d} style={{...card,minHeight:196,padding:10,display:"grid",gridTemplateRows:"auto 1fr auto",gap:8,background:isToday?"#FFF9EA":"#FFFDF8",borderColor:isToday?"#E8C878":"#E5DED2"}}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",gap:8}}>
          <div style={{minWidth:0}}><div style={{fontSize:11,fontWeight:900,color:"#746D61"}}>{DS[dowD(y,m,d)]}</div><b style={{fontSize:19,color:"#3F4A3A"}}>{d}</b></div>
          <button title="Detail du jour" onClick={()=>setDayMod(d)} style={{...btn(false),minWidth:68,height:32,padding:"0 9px",borderRadius:10,fontSize:12,lineHeight:1}}>+ Detail</button>
        </div>
        <div style={{display:"grid",gap:6,alignContent:"start"}}>
          {[["Matin",am,"#C99A52"],["Soir",pmw,"#6F7FA8"]].map(x=>shiftRow(x[0],x[1],x[2]))}
        </div>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",gap:6,minHeight:20,borderTop:"1px solid #EEE7DC",paddingTop:6}}>
          <span style={{fontSize:11,color:"#746D61",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{lieux[d]||"Lieu a preciser"}</span>
          {a?.types?.length>0&&<span style={{fontSize:12}}>{a.types.map(t=>ACTS.find(x=>x[0]===t)?.[2]).join("")}</span>}
        </div>
      </div>;
    };
    return <div className="su" style={{display:"grid",gap:12}}>
      <div style={{...card,padding:12,display:"grid",gridTemplateColumns:"auto 1fr auto",gap:10,alignItems:"center",background:"#FFFDF8"}}>
        <button onClick={()=>moveWeek(-1)} style={btn(false)}>‹ Semaine</button>
        <div style={{textAlign:"center",minWidth:0}}><b style={{display:"block",color:"#3F4A3A",fontSize:18}}>Semaine du {ws} au {rangeEnd} {MFR[m]}</b><span style={{fontSize:12,color:"#746D61"}}>{MFR[m]} {y}</span></div>
        <button onClick={()=>moveWeek(1)} style={btn(false)}>Semaine ›</button>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(7,minmax(0,1fr))",gap:8}}>{days.map(dayBox)}</div>
      <div style={{display:"flex",justifyContent:"flex-end"}}><button onClick={()=>setEmailMod(true)} style={btn(true,"#8B9A7A")}>Envoyer cette semaine</button></div>
    </div>;
  }

  function HoursView`;
    const teamMiniSource = String.raw`function TeamMini() {
    return null;
  }

  function MonthView`;
    const weekViewPatch = 'const googleWeekView = `' + weekViewSource + '`;\n  const googleTeamMini = `' + teamMiniSource + '`;';

    code = replaceOnce(
      code,
      '  function DayModal`;\n\n  try {',
      '  function DayModal`;\n\n  ' + weekViewPatch + '\n\n  try {'
    );

    code = replaceOnce(
      code,
      '.replace(/function ConfigView\\(\\) \\{[\\s\\S]*?\\n  function DayModal/, googleConfigView);',
      '.replace(/function TeamMini\\(\\) \\{[\\s\\S]*?\\n  function MonthView/, googleTeamMini)\n      .replace(/function WeekView\\(\\) \\{[\\s\\S]*?\\n  function HoursView/, googleWeekView)\n      .replace(/function ConfigView\\(\\) \\{[\\s\\S]*?\\n  function DayModal/, googleConfigView);'
    );

    code = replaceOnce(
      code,
      'const ruleDays = r => r?.days === "weekend" ? [4,5,6] : r?.days === "weekdays" ? [0,1,2,3] : r?.days === "custom" ? (r.custom||[]) : [0,1,2,3,4,5,6];',
      'const ruleDays = r => r?.days === "weekend" ? [5,6] : r?.days === "weekdays" ? [0,1,2,3,4] : r?.days === "custom" ? (r.custom||[]) : [0,1,2,3,4,5,6];'
    );

    code = replaceOnce(
      code,
      'source = source\n      .replace(/^import[^\\n]*(?:\\r?\\n|$)/gm, "")',
      'source = source\n      .replace("const [y,setY] = useState(now.getFullYear()), [m,setM] = useState(now.getMonth()), [view,setView] = useState(\\"month\\");", "const [y,setY] = useState(now.getFullYear()), [m,setM] = useState(now.getMonth()), [view,setView] = useState(\\"week\\");")\n      .replace("return <div style={{minHeight:\\"100vh\\",maxWidth:430,margin:\\"0 auto\\",background:\\"linear-gradient(155deg, #EBF5FF 0%, #FBFCFF 55%, #F0ECFF 100%)\\",fontFamily:\\"Nunito, system-ui, sans-serif\\",color:\\"#294C69\\"}}>", "return <div style={{minHeight:\\"100vh\\",maxWidth:1180,margin:\\"0 auto\\",background:\\"linear-gradient(155deg, #F7F4EE 0%, #FFFEFA 48%, #F1EDE4 100%)\\",fontFamily:\\"Nunito, system-ui, sans-serif\\",color:\\"#3F4A3A\\"}}>")\n      .replace("const wd = dowD(y,m,d), type = wd <= 3 ? \\"wd\\" : \\"we\\", endDow = type === \\"wd\\" ? 3 : 6;", "const wd = dowD(y,m,d), type = wd <= 4 ? \\"wd\\" : \\"we\\", endDow = type === \\"wd\\" ? 4 : 6;")\n      .replace(\'{we?"Ven→Dim":"Lun→Jeu"}\', \'{we?"Sam→Dim":"Lun→Ven"}\')\n      .replace(/^import[^\\n]*(?:\\r?\\n|$)/gm, "")'
    );

    code = replaceOnce(
      code,
      't === \\"wd\\" ? \\"Lun-Jeu\\" : \\"Ven-Dim\\"',
      't === \\"wd\\" ? \\"Lun-Ven\\" : \\"Sam-Dim\\"'
    );

    code = replaceOnce(
      code,
      '{schedRule==="twoDayRest"&&<><p style={{fontSize:12,color:"#667F94",margin:"10px 0 6px"}}>Repos semaine 1</p><div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:7}}>{activeIds.map((p,i)=><button key={p} onClick={()=>setRestStart(i)} style={btn(restStart===i,PAL[pidIx(p)].solid)}>{pName(names,p,priv)}</button>)}</div></>}',
      ''
    );

    code = replaceOnce(code, '>2j + repos</button>', '>2 jours</button>');

    code = replaceOnce(
      code,
      '<div style={{display:\\"grid\\",gridTemplateColumns:\\"repeat(4,1fr)\\",gap:7,marginTop:10}}>{[[\\"month\\",\\"📅\\"],[\\"week\\",\\"📋\\"],[\\"hours\\",\\"⏱\\"],[\\"config\\",\\"⚙️\\"]].map(x=><button key={x[0]} onClick={()=>setView(x[0])} style={btn(view===x[0],\\"#7BAFD4\\")}>{x[1]}</button>)}</div>',
      '<div style={{display:\\"grid\\",gridTemplateColumns:\\"repeat(5,minmax(0,1fr))\\",gap:8,marginTop:10}}>{[[\\"week\\",\\"Semaine\\",\\"Planning\\",\\"view\\"],[\\"month\\",\\"Mois\\",\\"Vue globale\\",\\"view\\"],[\\"me\\",\\"Envoyer\\",\\"Equipe\\",\\"email\\"],[\\"year\\",\\"Annee\\",\\"Recap\\",\\"year\\"],[\\"config\\",\\"Reglages\\",\\"Equipe\\",\\"view\\"]].map(x=><button key={x[0]} onClick={()=>x[3]===\\"year\\"?setYearMod(true):x[3]===\\"email\\"?setEmailMod(true):setView(x[0])} style={{...btn(view===x[0],\\"#8B9A7A\\"),minHeight:54,flexDirection:\\"column\\",alignItems:\\"flex-start\\",lineHeight:1.15,padding:\\"9px 10px\\"}}><span style={{fontSize:13,fontWeight:900}}>{x[1]}</span><span style={{fontSize:10,color:view===x[0]?\\"rgba(255,255,255,.82)\\":\\"#746D61\\"}}>{x[2]}</span></button>)}</div>'
    );

    code = replaceOnce(
      code,
      '<div style={{display:\\"flex\\",gap:7}}><button title={priv?`Connecte : ${authEmail||\\"admin\\"}`:\\"Connexion\\"} onClick={()=>priv?signOut():setLoginMod(true)} style={btn(priv,\\"#8B9A7A\\")}>{priv?\\"🔓 Connecte\\":\\"🔐 Connexion\\"}</button><button title=\\"Vue annuelle\\" onClick={()=>setYearMod(true)} style={btn(false)}>📅 Annee</button><button title=\\"Rapport\\" onClick={()=>setPdfMod(true)} style={btn(false)}>📄 Rapport</button></div>',
      '<div style={{display:\\"flex\\",gap:7,alignItems:\\"center\\"}}><button title={priv?`Connecte : ${authEmail||\\"admin\\"}`:\\"Connexion Google\\"} onClick={()=>priv?signOut():setLoginMod(true)} style={btn(priv,\\"#8B9A7A\\")}>{priv?\\"Connecte\\":\\"Connexion\\"}</button><button title=\\"Rapport\\" onClick={()=>setPdfMod(true)} style={btn(false)}>Rapport</button></div>'
    );

    code = replaceOnce(
      code,
      '<button title=\\"Vue annuelle\\" onClick={()=>setYearMod(true)} style={btn(false)}>📅 Annee</button><button title=\\"Rapport\\" onClick={()=>setPdfMod(true)} style={btn(false)}>📄 Rapport</button>',
      '<button title=\\"Rapport\\" onClick={()=>setPdfMod(true)} style={btn(false)}>📄 Rapport</button>'
    );

    code = replaceOnce(
      code,
      'if (ov) { b.workerId = ov; if (usable(b.workerId,b)) weIdx = (weTeam.indexOf(b.workerId)+1+weTeam.length)%weTeam.length; prevWe = b.workerId; return; }\n    if (inheritWeWorker',
      'if (ov) { b.workerId = ov; if (usable(b.workerId,b)) weIdx = (weTeam.indexOf(b.workerId)+1+weTeam.length)%weTeam.length; prevWe = b.workerId; return; }\n    if (b.shift === "evening") { const am = blks.find(x => x.baseIdx === b.baseIdx && x.shift === "morning"); if (am?.workerId && usable(am.workerId,b)) { b.workerId = am.workerId; prevWe = b.workerId; return; } }\n    if (inheritWeWorker'
    );

    code = replaceOnce(
      code,
      'if (ov && ov !== WE_ONLY) { b.workerId = ov; wdIdx = (wdTeam.indexOf(b.workerId)+1+wdTeam.length)%wdTeam.length; prevWd = b.workerId; return; }\n    const sameWeekWE',
      'if (ov && ov !== WE_ONLY) { b.workerId = ov; wdIdx = (wdTeam.indexOf(b.workerId)+1+wdTeam.length)%wdTeam.length; prevWd = b.workerId; return; }\n    if (b.shift === "evening") { const am = blks.find(x => x.baseIdx === b.baseIdx && x.shift === "morning"); if (am?.workerId && usable(am.workerId,b)) { b.workerId = am.workerId; prevWd = b.workerId; return; } }\n    const sameWeekWE'
    );

    code = replaceOnce(
      code,
      'if (blkOverrides[b.idx] || blkOverrides[b.baseIdx]) b.workerId = blkOverrides[b.idx] || blkOverrides[b.baseIdx];\n      if (!b.workerId) {\n        for (let k=0;k<team.length;k++) {\n          const p = team[(rot+k)%team.length];\n          const inRest = restWeek(p) === weekOf(b.start) || restWeek(p) === weekOf(b.end);',
      'if (blkOverrides[b.idx] || blkOverrides[b.baseIdx]) b.workerId = blkOverrides[b.idx] || blkOverrides[b.baseIdx];\n      if (!b.workerId && s.id === "evening") { const am = blks.find(x => x.baseIdx === b.baseIdx && x.shift === "morning"); if (am?.workerId && usable(am.workerId,b)) b.workerId = am.workerId; }\n      if (!b.workerId) {\n        for (let k=0;k<team.length;k++) {\n          const p = team[(rot+k)%team.length];\n          const inRest = restWeek(p) === weekOf(b.start) || restWeek(p) === weekOf(b.end);'
    );

    code = replaceOnce(
      code,
      'const inRest = restWeek(p) === weekOf(b.start) || restWeek(p) === weekOf(b.end);\n          if (usable(p,b) && !inRest && p !== prev)',
      'if (usable(p,b) && p !== prev)'
    );

    code = replaceOnce(
      code,
      'if (blkOverrides[b.idx] || blkOverrides[b.baseIdx]) b.workerId = blkOverrides[b.idx] || blkOverrides[b.baseIdx];\n      if (!b.workerId) {\n        for (let k=0;k<team.length;k++) {\n          const p = team[(rot+k)%team.length];\n          if (usable(p,d) && allowedShift(p,s.id,auxRules) && p !== prev)',
      'if (blkOverrides[b.idx] || blkOverrides[b.baseIdx]) b.workerId = blkOverrides[b.idx] || blkOverrides[b.baseIdx];\n      if (!b.workerId && s.id === "evening") { const am = blks.find(x => x.baseIdx === b.baseIdx && x.shift === "morning"); if (am?.workerId && usable(am.workerId,d) && allowedShift(am.workerId,s.id,auxRules)) b.workerId = am.workerId; }\n      if (!b.workerId) {\n        for (let k=0;k<team.length;k++) {\n          const p = team[(rot+k)%team.length];\n          if (usable(p,d) && allowedShift(p,s.id,auxRules) && p !== prev)'
    );

    code = replaceOnce(
      code,
      '  const sched = fillSched(blks);\n  return { sched, blks };\n};\n\nconst buildDailySched',
      '  const sched = fillSched(blks);\n  blks.filter(b => b.type === "two" && b.shift === "morning").forEach(b => {\n    const evening = sched[b.end]?.evening;\n    if (!evening || blkOverrides[evening.bi] || blkOverrides[evening.base]) return;\n    const nextMorning = blks.find(x => x.type === "two" && x.shift === "morning" && x.baseIdx === b.baseIdx + 1);\n    let nextWorker = nextMorning?.workerId;\n    if (!nextWorker && team.length) {\n      const cur = Math.max(0, team.indexOf(b.workerId));\n      nextWorker = team[(cur + 1) % team.length];\n    }\n    if (nextWorker && usable(nextWorker, {...b, shift:"evening"})) evening.worker = nextWorker;\n  });\n  return { sched, blks };\n};\n\nconst buildDailySched'
    );

    code = replaceOnce(
      code,
      '<b>{x[0]}</b><span>{x[1]?initial(names,x[1].worker,priv):"-"}</span>',
      '<b style={{color:"#746D61",background:"#FFFFFF",border:"1px solid #E5DED2",borderRadius:6,minWidth:12,textAlign:"center"}}>{x[0]}</b><span>{x[1]?initial(names,x[1].worker,priv):"-"}</span>'
    );

    code = replaceOnce(
      code,
      '<b>{x[0]}</b><span>{x[1]?initial(names,x[1].worker,priv):\\"-\\"}</span>',
      '<b style={{color:\\"#746D61\\",background:\\"#FFFFFF\\",border:\\"1px solid #E5DED2\\",borderRadius:6,minWidth:12,textAlign:\\"center\\"}}>{x[0]}</b><span>{x[1]?initial(names,x[1].worker,priv):\\"-\\"}</span>'
    );

    (0, eval)(code + "\n//# sourceURL=browser-loader.patched.js");
    const polishNav = () => {
      const root = document.getElementById("root");
      if (!root) return;
      const iconButtons = [...root.querySelectorAll("button")].filter(b => ["📅","📋","⏱","⚙️"].includes(b.textContent.trim()));
      if (iconButtons.length < 4) return;
      const parent = iconButtons[0].parentElement;
      const labels = [
        { old:"📋", main:"Semaine", sub:"Planning" },
        { old:"📅", main:"Mois", sub:"Vue globale" },
        { old:"⏱", main:"Heures", sub:"Suivi" },
        { old:"⚙️", main:"Reglages", sub:"Equipe" }
      ];
      labels.forEach(item => {
        const b = iconButtons.find(x => x.textContent.trim() === item.old);
        if (!b) return;
        b.innerHTML = `<span style="font-size:13px;font-weight:900">${item.main}</span><span style="font-size:10px;color:#746D61">${item.sub}</span>`;
        Object.assign(b.style, { minHeight:"54px", flexDirection:"column", alignItems:"flex-start", lineHeight:"1.15", padding:"9px 10px" });
        parent?.appendChild(b);
      });
      if (parent) Object.assign(parent.style, { gridTemplateColumns:"repeat(4,minmax(0,1fr))", gap:"8px" });
    };
    polishNav();
    const navTimer = setInterval(polishNav, 500);
    setTimeout(() => clearInterval(navTimer), 5000);
  } catch (error) {
    fail(error);
  }
})();

    </script>
  </body>
</html>
