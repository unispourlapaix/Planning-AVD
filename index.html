<!doctype html>
<html lang="fr">
  <head><meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" /><meta name="theme-color" content="#F7F4EE" /><link rel="icon" href="data:," /><title>Planning-AVD</title><style>#root button span b{color:#746D61!important;background:#FFFFFF!important;border:1px solid #E5DED2!important;border-radius:6px!important;min-width:12px!important;text-align:center!important}</style></head>
  <body>
    <div id="root"></div>
    <script src="https://cdn.jsdelivr.net/npm/react@18/umd/react.production.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@babel/standalone/babel.min.js"></script>
    <script src="./auth-config.js"></script>
    <script>
      (async () => {
        const fail = error => {
          console.error(error);
          const root = document.getElementById("root");
          if (root) root.innerHTML = '<div style="font:16px system-ui;padding:24px;color:#7a1d1d">Impossible de charger Planning-AVD. Rechargez la page dans un instant.</div>';
        };
        try {
          const response = await fetch("https://raw.githubusercontent.com/unispourlapaix/Planning-AVD/main/patch-loader.js?v=20260524-night-default", { cache: "no-cache" });
          if (!response.ok) throw new Error("patch-loader.js introuvable");
          let source = await response.text();
          source = source.replace(
            /\s*\(0, eval\)\(code \+ "\\n\/\/# sourceURL=browser-loader\.patched\.js"\);/,
            '\n    code = code.replace("const fillSched = blks => {", "const syncNightWorkers = blks => { blks.filter(b => b.shift === \\"night\\" && !b.workerId).forEach(n => { const day = blks.find(x => x.baseIdx === n.baseIdx && (x.shift === \\"evening\\" || x.shift === \\"morning\\") && x.workerId); if (day?.workerId) n.workerId = day.workerId; }); return blks; };\\nconst fillSched = blks => {").replaceAll("const sched = fillSched(blks);", "syncNightWorkers(blks);\\n  const sched = fillSched(blks);");\n    (0, eval)(code + "\\n//# sourceURL=browser-loader.patched.js");'
          );
          (0, eval)(source + "\n//# sourceURL=patch-loader.accounts.js");
        } catch (error) { fail(error); }
      })();
    </script>
  </body>
</html>
