name: Apply Codex update

on:
  push:
    branches: [main]
    paths:
      - .github/codex-update.patch.gz.b64
  issues:
    types: [opened]

permissions:
  contents: write

jobs:
  apply-update:
    if: github.event_name == 'push' || github.event.issue.title == '[Codex] Apply validated Planning-AVD update'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - name: Apply validated update
        shell: bash
        run: |
          base64 --decode .github/codex-update.patch.gz.b64 | gzip --decompress > /tmp/codex-update.patch
          git apply --index --whitespace=nowarn /tmp/codex-update.patch
          git rm .github/codex-update.patch.gz.b64
      - name: Publish application changes
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "Add shared team tools"
          git push origin HEAD:main
