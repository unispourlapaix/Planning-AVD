name: Repair current Planning-AVD release

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  repair:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Repair source
        shell: python
        run: |
          from pathlib import Path

          repairs = {
              "src/modules/personal-team-calendar.js": (
                  b'${DAYS_SHORT[(date.getDay() + 6) % 7]}</div>',
                  b'${DAYS_SHORT[(date.getDay() + 6) % 7]}</span></div>',
              ),
              "src/modules/scheduler.js": (
                  b'% math.max(1, candidates.length);',
                  b'% Math.max(1, candidates.length);',
              ),
          }

          for name, (old, new) in repairs.items():
              path = Path(name)
              content = path.read_bytes()
              if old in content:
                  path.write_bytes(content.replace(old, new))

          Path(".github/workflows/repair-release.yml").unlink()

      - name: Publish repaired release
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/modules/personal-team-calendar.js src/modules/scheduler.js .github/workflows/repair-release.yml
          git diff --cached --check
          git commit -m "Repair source before PWA release"
          git push
